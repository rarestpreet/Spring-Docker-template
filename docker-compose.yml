services:

  mysql:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: passIs1234
      MYSQL_DATABASE: db
    ports:
      - "3307:3306"

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 10
      timeout: 5s

  spring:
    container_name: spring_container
    build: .
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    environment:
      PORT: 8080